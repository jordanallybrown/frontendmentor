<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/normalize.css">
  <link rel="stylesheet" href="./styles/style.css">
  <title>Frontend Mentor | NFT preview card component</title>


</head>
<body>

  <main>
    <h1 class="sr-only">Frontend Mentor NFT Preview Card component solution.</h1>
    <article class="card">

      <a class="card__hero">
        <img src="./images/image-equilibrium.jpg" alt="Equilibrium hero image">
      </a>
  
      <header class="card__header"><a href="">Equilibrium #3429</a></header>
      <p class="card__description">
        Our Equilibrium collection promotes balance and calm.
      </p>
      <ul class="card__listing-meta">
        <li>0.041 ETH</li>
        <li>3 days left</li>
      </ul>
      <section class="card__author-meta">
        <img class="card__author-icon" src="./images/image-avatar.png" alt="Author avatar">
        <p class="card__author">Creation of <a href="">Jules Wyvern</a></p>
      </section>
    </article>
  </main>



  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/jordanallybrown/">Jordan</a>.
  </footer>

</body>
</html>

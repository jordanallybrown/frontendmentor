<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <h1 class="sr-only">Blog preview card</h1>
      <article class="card">
        <img
          class="card__feature-img"
          src="./assets/images/illustration-article.svg"
          alt="Article illustration for blog post"
        />
        <div class="card__content">
          <ul class="card__categories">
            <li>Learning</li>
          </ul>
          <small class="card__post-meta">Published 21 Dec 2023 </small>
          <h2 class="card__title"><a href="#">HTML & CSS foundations</a></h2>
          <p class="card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="card__author-meta">
          <img
            class="card__avatar"
            src="./assets/images/image-avatar.webp"
            alt="Author avatar"
          />
          <p class="card__author">Greg Hooper</p>
        </div>
      </article>
    </main>

    <!-- <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Jordan</a>.
    </div> -->
  </body>
</html>

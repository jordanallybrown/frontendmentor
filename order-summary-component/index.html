<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/normalize.css">
  <link rel="stylesheet" href="./styles/style.css">
  
  <title>Frontend Mentor | Order summary card</title>


</head>
<body>

  <main>
   
    <h1 class="sr-only">Frontend Mentor Order Summary component solution.</h1>
    <article class="card card--box-shadow">
      <header>Order Summary</header>
      <p>You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!</p>
      <article class="card__widget">
        <section>
          <img src="./images/icon-music.svg" alt="Music icon">
          <dl>
            <dt>Annual Plan</dt>
            <dd>$59.99/year</dd>
          </dl>
        </section>
        <a href="">Change</a>
      </article>
      <button class="button--box-shadow">Proceed to Payment</button>
      <a href="">Cancel Order</a>

    </article>

  </main>
  
  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/jordanallybrown/">Jordan</a>.
  </footer>
</body>
</html>
